name: Run Scoring Service

on:
  # Triggered by data warehouse after Dataform materializes complexity predictions
  repository_dispatch:
    types: [dataform_complexity_ready]

  workflow_dispatch:
    inputs:
      start_year:
        description: 'Start year for predictions'
        required: false
        default: '2025'
      end_year:
        description: 'End year for predictions'
        required: false
        default: '2030'
      n_samples:
        description: 'Number of posterior samples for simulation'
        required: false
        default: '1000'
      max_games:
        description: 'Maximum games per batch'
        required: false
        default: '50000'

env:
  GCP_PROJECT_ID: bgg-predictive-models

jobs:
  score-simulations:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'PROD' || 'DEV' }}

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set Environment Variables
      id: env
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "env_name=prod" >> $GITHUB_OUTPUT
        else
          echo "env_name=dev" >> $GITHUB_OUTPUT
        fi

    - name: Authenticate to Google Cloud
      id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY_BGG_ML }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Get Service URL
      id: get-url
      run: |
        SERVICE_URL=$(gcloud run services describe bgg-model-scoring \
          --region us-central1 \
          --format 'value(status.url)')
        echo "service_url=$SERVICE_URL" >> $GITHUB_OUTPUT

    - name: Get ID Token
      id: id-token
      run: |
        ID_TOKEN=$(gcloud auth print-identity-token)
        echo "::add-mask::$ID_TOKEN"
        echo "token=$ID_TOKEN" >> $GITHUB_OUTPUT

    - name: Read Model Names from Config
      id: models
      run: |
        pip install pyyaml -q
        python3 -c "
        import yaml
        with open('config.yaml') as f:
            config = yaml.safe_load(f)
        models = config['scoring']['models']
        print(f\"hurdle={models['hurdle']}\")
        print(f\"complexity={models['complexity']}\")
        print(f\"rating={models['rating']}\")
        print(f\"users_rated={models['users_rated']}\")
        print(f\"geek_rating={models['geek_rating']}\")
        " >> $GITHUB_OUTPUT

    - name: Run Simulations (Batched)
      id: simulate
      run: |
        START_YEAR="${{ github.event.inputs.start_year || '2025' }}"
        END_YEAR="${{ github.event.inputs.end_year || '2030' }}"
        N_SAMPLES="${{ github.event.inputs.n_samples || '1000' }}"
        MAX_GAMES="${{ github.event.inputs.max_games || '50000' }}"

        TOTAL_GAMES=0
        BATCH_COUNT=0
        MAX_BATCHES=10  # Safety limit

        while [ $BATCH_COUNT -lt $MAX_BATCHES ]; do
          BATCH_COUNT=$((BATCH_COUNT + 1))
          echo "=== Batch $BATCH_COUNT ==="

          RESPONSE=$(curl -X POST "${{ steps.get-url.outputs.service_url }}/simulate_games" \
            -H "Authorization: Bearer ${{ steps.id-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"hurdle_model_name\": \"${{ steps.models.outputs.hurdle }}\",
              \"complexity_model_name\": \"${{ steps.models.outputs.complexity }}\",
              \"rating_model_name\": \"${{ steps.models.outputs.rating }}\",
              \"users_rated_model_name\": \"${{ steps.models.outputs.users_rated }}\",
              \"geek_rating_model_name\": \"${{ steps.models.outputs.geek_rating }}\",
              \"start_year\": $START_YEAR,
              \"end_year\": $END_YEAR,
              \"n_samples\": $N_SAMPLES,
              \"use_change_detection\": true,
              \"max_games\": $MAX_GAMES,
              \"upload_to_data_warehouse\": true
            }" \
            -w "\n%{http_code}" \
            -s \
            --max-time 1800)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

          echo "$BODY" | jq '.'
          GAMES_SIMULATED=$(echo "$BODY" | jq -r '.games_simulated')
          TOTAL_GAMES=$((TOTAL_GAMES + GAMES_SIMULATED))

          echo "Batch $BATCH_COUNT: Simulated $GAMES_SIMULATED games (Total: $TOTAL_GAMES)"

          # Stop if no more games to simulate
          if [ "$GAMES_SIMULATED" -eq 0 ]; then
            echo "No more games to simulate. Stopping."
            break
          fi

          # Brief pause between batches
          sleep 5
        done

        echo "total_games=$TOTAL_GAMES" >> $GITHUB_OUTPUT
        echo "batch_count=$BATCH_COUNT" >> $GITHUB_OUTPUT

    - name: Job Summary
      run: |
        echo "## Scoring Service Results" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: ${{ steps.env.outputs.env_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Models**: ${{ steps.models.outputs.hurdle }}, ${{ steps.models.outputs.complexity }}, ${{ steps.models.outputs.rating }}, ${{ steps.models.outputs.users_rated }}, ${{ steps.models.outputs.geek_rating }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Year Range**: ${{ github.event.inputs.start_year || '2025' }}-${{ github.event.inputs.end_year || '2030' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **N Samples**: ${{ github.event.inputs.n_samples || '1000' }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Batches Completed**: ${{ steps.simulate.outputs.batch_count }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Total Games Scored**: ${{ steps.simulate.outputs.total_games }}" >> $GITHUB_STEP_SUMMARY
