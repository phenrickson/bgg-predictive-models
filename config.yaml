# Data Warehouse Configuration (read data source, write predictions)
# Note: No environment suffix - single project with simplified dataset names
data_warehouse:
  project_id: bgg-data-warehouse
  location: US
  datasets:
    raw: raw
    core: core
    analytics: analytics
  features_table: games_features
  features_dataset: analytics

# Predictions Destination (landing table - Dataform in bgg-data-warehouse consumes this)
predictions:
  project_id: bgg-predictive-models
  dataset: raw
  table: ml_predictions_landing

# ML Project Configuration
ml_project:
  project_id: bgg-predictive-models
  bucket_name: bgg-predictive-models
  # Models stored at: gs://bgg-predictive-models/{environment}/models/...
  # Predictions at: gs://bgg-predictive-models/{environment}/predictions/...

  # Default environment
default_environment: dev

# Year Configuration
# All years are inclusive (e.g., train_through: 2021 means include 2021)
years:
  current: 2026
  recent_year_threshold: 2 # years to exclude from current when finalizing
  training:
    train_through: 2022 # train on data through this year (inclusive)
    tune_start: 2023
    tune_through: 2023
    test_start: 2024
    test_through: 2024
  # years to run over for year over year evaluation
  eval:
    start: 2018
    end: 2024
  # data to score with trained model
  score:
    start: 2025 # current - 1
    end: 2030 # current + 4

# Model Configuration
models:
  predictions_dir: "./models/experiments/predictions"
  hurdle:
    type: logistic
    experiment_name: logistic-hurdle-normalize
    use_embeddings: true
  complexity:
    type: ard
    experiment_name: ard-complexity-normalize
    use_sample_weights: false
    use_embeddings: true
  rating:
    type: ard
    experiment_name: ard-ridge-rating-normalize
    use_sample_weights: false
    min_ratings: 5
    use_embeddings: true
  users_rated:
    type: ard
    experiment_name: ard-ridge-users_rated-normalize
    use_sample_weights: false
    min_ratings: 0
    use_embeddings: true
  geek_rating:
    type: ard
    experiment_name: ard-geek_rating-normalize
    mode: direct # or "stacking"
    min_ratings: 25 # only used for direct mode
    use_embeddings: true # only used for direct mode
    include_predictions: true

# Evaluate models over time
evaluate:
  output_dir: "./models/experiments"

# Simulation Configuration
# Settings for simulation-based uncertainty estimation
simulation:
  n_samples: 500 # Number of posterior samples per game
  geek_rating_mode: direct # bayesian, stacking, or direct
  output_dir: "./models/simulation"
  save_predictions: true
  random_state: 42

# Embeddings Configuration
embeddings:
  algorithm: svd # pca, svd, umap, autoencoder
  embedding_dim: 64
  experiment_name: game-embeddings
  min_ratings: 5 # Minimum users_rated for training data
  use_embeddings: true # Use description embeddings (emb_*) as input features
  algorithms:
    pca:
      whiten: true
    svd:
      n_iter: 5
    autoencoder:
      hidden_layers: [ 512, 256, 128 ]
      epochs: 200
      batch_size: 256
      learning_rate: 0.001
      patience: 15
      min_delta: 0.000001
    vae:
      hidden_layers: [ 512, 256, 128 ]
      epochs: 150
      batch_size: 256
      learning_rate: 0.001
      beta: 1.0
      patience: 15
      min_delta: 0.000001
  upload:
    # Raw table where new embeddings are written (Dataform pulls from here)
    dataset: raw
    table: game_embeddings
  vector_search:
    # Enriched table for similarity search (embeddings + game features for filtering)
    project: bgg-data-warehouse
    dataset: analytics
    table: game_similarity_search
  search:
    default_distance_type: cosine # cosine, euclidean, dot_product
    default_top_k: 10

# Text Embeddings Configuration (word embeddings from descriptions)
text_embeddings:
  algorithm: pmi # pmi, word2vec
  embedding_dim: 100
  experiment_name: text-embeddings
  document_method: sif # mean, tfidf, sif
  algorithms:
    pmi:
      window_size: 5
      min_count: 5
    word2vec:
      window_size: 5
      min_count: 5
      sg: 1 # 1 for skip-gram, 0 for CBOW
      epochs: 10
  # Upload configuration for BigQuery (same pattern as game_embeddings)
  upload:
    dataset: raw
    table: description_embeddings

# Collection Modeling Configuration
collections:
  storage:
    bucket_name: bgg-predictive-models
    base_prefix: collections
  split:
    # Classification splitting. Mirrors ClassificationSplitConfig.
    # split_mode: stratified_random | time_based
    classification:
      split_mode: time_based
      train_through: 2022 # last year (inclusive) in training
      prediction_window: 2 # validation window in years (val = 2023-2024)
      test_window: 1 # test window in years (test = 2025)
      time_column: year_published
      random_seed: 1999
      # stratified_random fallback ratios — used only when split_mode=stratified_random
      validation_ratio: 0.15
      test_ratio: 0.15
    # Regression splitting. Mirrors RegressionSplitConfig (random shuffle).
    regression:
      validation_ratio: 0.15
      test_ratio: 0.15
      random_seed: 42
  model:
    type: lightgbm
    use_sample_weights: false
    handle_imbalance: scale_pos_weight
    threshold_optimization_metric: f2 # f1, f2, precision, recall
    tuning_metric: log_loss
  analysis:
    top_n_recommendations: 100
    top_n_categories: 10
    top_n_mechanics: 10
  min_ratings_for_universe: 25
  # Last year (inclusive) the finalize step refits each candidate on. After
  # tuning + evaluation against the time-based splits, finalize() refits on
  # train+val+test filtered to year_published <= finalize_through. The
  # resulting pipeline is what scores upcoming releases.
  finalize_through: 2025
  outcomes:
    own:
      task: classification
      label_from: owned
    ever_owned:
      task: classification
      label_from: { any_of: [ owned, prev_owned ] }
    rated:
      task: classification
      label_from: { column: user_rating, predicate: "> 0" }
    rating:
      task: regression
      label_from: user_rating
      require: "user_rating > 0"
    love:
      task: classification
      label_from: { column: user_rating, predicate: ">= 8" }
      require: "user_rating > 0"
  candidates:
    - name: logistic_default
      tuning: holdout
      downsample_negatives_ratio: 500
      downsample_protect_min_ratings: 25
      notes: "Logistic regression baseline, holdout-tuned against time-based val"
      classification_config:
        model_type: logistic
        tuning_metric: log_loss
        threshold_optimization_metric: f2
        preprocessor_kwargs:
          preserve_columns:
            - year_published
            - predicted_complexity
    - name: logistic_row_norm
      tuning: holdout
      downsample_negatives_ratio: 500
      downsample_protect_min_ratings: 25
      notes: "Logistic with row-wise L2 normalization on mechanic/category/family
        blocks"
      classification_config:
        model_type: logistic
        tuning_metric: log_loss
        threshold_optimization_metric: f2
        preprocessor_kwargs:
          preserve_columns:
            - year_published
            - predicted_complexity
          normalize_row_families:
            - mechanics
            - categories
            - families
    - name: logistic_designer_heavy
      tuning: holdout
      downsample_negatives_ratio: 500
      downsample_protect_min_ratings: 25
      notes: "Logistic with row-wise L2 normalization on mechanic/category/family
        blocks"
      classification_config:
        model_type: logistic
        tuning_metric: log_loss
        threshold_optimization_metric: f2
        preprocessor_kwargs:
          preserve_columns:
            - year_published
            - predicted_complexity
          normalize_row_families:
            - mechanics
            - categories
            - families
          designer_min_freq: 3
          max_family_features: 100
    - name: lgbm_default
      tuning: holdout
      downsample_negatives_ratio: 500
      downsample_protect_min_ratings: 25
      notes: "LightGBM baseline, holdout-tuned against time-based val"
      classification_config:
        model_type: lightgbm
        tuning_metric: log_loss
        threshold_optimization_metric: f2
        preprocessor_kwargs:
          preserve_columns:
            - year_published
            - predicted_complexity
    - name: lgbm_row_norm
      tuning: holdout
      downsample_negatives_ratio: 500
      downsample_protect_min_ratings: 25
      notes: "LightGBM with row-wise L2 normalization on mechanic/category/family
        blocks"
      classification_config:
        model_type: lightgbm
        tuning_metric: log_loss
        threshold_optimization_metric: f2
        preprocessor_kwargs:
          preserve_columns:
            - year_published
            - predicted_complexity
          normalize_row_families:
            - mechanics
            - categories
            - families
  scoring:
    registry_table: bgg-predictive-models.raw.collection_models_registry
    landing_table: bgg-predictive-models.raw.collection_predictions_landing

# Scoring Configuration
scoring:
  models:
    hurdle: hurdle-v2026 # Name of registered model to use
    complexity: complexity-v2026
    rating: rating-v2026
    users_rated: users_rated-v2026
    geek_rating: geek_rating-v2026
    embeddings: embeddings-v2026
  parameters:
    prior_rating: 5.5
    prior_weight: 2000
  output:
    predictions_path: data/predictions/game_predictions.parquet
